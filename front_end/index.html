<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Irradiation & Generation Analyzer</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #f5f7fa;
            text-align: center;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 60%;
            margin: auto;
            margin-top: 40px;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.1);
        }

        h1 {
            color: #018bd5;
        }

        input {
            padding: 10px;
            margin: 10px;
            width: 25%;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            background-color: #018bd5;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: #016fa8;
        }

        table {
            width: 100%;
            margin-top: 25px;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
        }

        th {
            background-color: #018bd5;
            color: white;
        }

        canvas {
            margin-top: 30px;
        }

        /* Loader */
        #loader {
            margin-top: 20px;
            display: none;
        }

        .spinner {
            border: 6px solid #f3f3f3;
            border-top: 6px solid #018bd5;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            margin: auto;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>

<body>

<div class="container">
    <h1>Irradiation & Generation Analyzer</h1>

    <input type="text" id="location" placeholder="Location Name">
    <input type="number" id="lat" placeholder="Latitude">
    <input type="number" id="lon" placeholder="Longitude">
    <input type="number" id="pr" placeholder="Performance Ratio (e.g. 0.75)">

    <br>

    <button onclick="getIrradiation()">Get Data</button>

    <!-- Loader -->
    <div id="loader">
        <div class="spinner"></div>
        <p>Fetching data from satellite sources...</p>
    </div>

    <!-- TABLE -->
    <table id="resultTable" style="display:none;">
        <thead>
            <tr>
                <th>Metric</th>
                <th>Value</th>
                <th>Year</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Minimum Irradiation_kWh/sq.mtr</td>
                <td id="minVal"></td>
                <td id="minYear"></td>
            </tr>
            <tr>
                <td>Average Irradiation_kWh/sq.mtr</td>
                <td id="avgVal"></td>
                <td>-</td>
            </tr>
            <tr>
                <td>Maximum Irradiation_kWh/sq.mtr</td>
                <td id="maxVal"></td>
                <td id="maxYear"></td>
            </tr>

            <tr>
                <td>Minimum Specific Generation_kWh</td>
                <td id="minGen"></td>
                <td>-</td>
            </tr>
            <tr>
                <td>Average Specific Generation_kWh</td>
                <td id="avgGen"></td>
                <td>-</td>
            </tr>
            <tr>
                <td>Maximum Specific Generation_kWh</td>
                <td id="maxGen"></td>
                <td>-</td>
            </tr>
        </tbody>
    </table>

    <!-- CHART -->
    <canvas id="irradiationChart"></canvas>

</div>

<script>
let chart;

async function getIrradiation() {
    const lat = document.getElementById("lat").value;
    const lon = document.getElementById("lon").value;
    const pr = document.getElementById("pr").value;

    // Show loader
    document.getElementById("loader").style.display = "block";
    document.getElementById("resultTable").style.display = "none";

    try {
        const response = await fetch(
            `https://irradiation-estimate.onrender.com/evaluate-generation?lat=${lat}&lon=${lon}&pr=${pr}`
        );

        const data = await response.json();

        // Irradiation
        document.getElementById("minVal").innerText = data.min_irradiation;
        document.getElementById("minYear").innerText = data.min_year;

        document.getElementById("maxVal").innerText = data.max_irradiation;
        document.getElementById("maxYear").innerText = data.max_year;

        document.getElementById("avgVal").innerText = data.avg_irradiation;

        // Generation
        document.getElementById("minGen").innerText = data.min_generation;
        document.getElementById("maxGen").innerText = data.max_generation;
        document.getElementById("avgGen").innerText = data.avg_generation;

        document.getElementById("resultTable").style.display = "table";

        // Chart (Generation)
        const ctx = document.getElementById("irradiationChart").getContext("2d");

        if (chart) chart.destroy();

        chart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['Minimum', 'Average', 'Maximum'],
                datasets: [{
                    label: 'Generation',
                    data: [
                        data.min_generation,
                        data.avg_generation,
                        data.max_generation
                    ],
                    backgroundColor: '#018bd5'
                }]
            },
            options: {
                responsive: true,
                scales: {
                    y: { beginAtZero: true }
                }
            }
        });

    } catch (error) {
        console.error(error);
        alert("Error fetching data. Please try again.");
    }

    // Hide loader
    document.getElementById("loader").style.display = "none";
}
</script>

</body>
</html>
